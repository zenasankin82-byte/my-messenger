<!DOCTYPE html>
<html>
<head>
    <title>My Messenger</title>
    <style>
        body {
            font-family: Arial;
            margin: 20px;
        }

        #online {
            margin-bottom: 20px;
            padding: 0;
            list-style-type: none;
        }

        #messages {
            list-style-type: none;
            padding: 0;
            margin-bottom: 20px;
        }

        li {
            padding: 5px 10px;
        }

        form {
            display: flex;
        }

        input {
            padding: 10px;
            flex: 1;
        }

        button {
            padding: 10px;
        }
    </style>
</head>
<body>

<h2>Simple Messenger</h2>

<h3>Online users:</h3>
<ul id="online"></ul>

<h3>Messages:</h3>
<ul id="messages"></ul>

<form id="form">
    <input id="input" autocomplete="off" placeholder="Введите сообщение..." />
    <button type="submit">Send</button>
</form>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
