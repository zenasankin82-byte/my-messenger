<!DOCTYPE html>
<html>
<head>
    <title>My Messenger</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 220px;
            background: #1e293b;
            color: white;
            padding: 20px;
        }

        .sidebar h3 {
            margin-top: 0;
        }

        #online {
            list-style: none;
            padding: 0;
        }

        #online li {
            margin-bottom: 8px;
            font-size: 14px;
        }

        .chat {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .message {
            max-width: 60%;
            padding: 10px 14px;
            margin-bottom: 10px;
            border-radius: 16px;
            font-size: 14px;
        }

        .my-message {
            align-self: flex-end;
            background: #3b82f6;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .other-message {
            align-self: flex-start;
            background: #e2e8f0;
            border-bottom-left-radius: 4px;
        }

        .input-area {
            display: flex;
            padding: 15px;
            background: white;
            border-top: 1px solid #ddd;
        }

        .input-area input {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        .input-area button {
            margin-left: 10px;
            padding: 10px 15px;
            border: none;
            background: #3b82f6;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        .username {
            font-weight: bold;
            font-size: 12px;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h3>Online</h3>
    <ul id="online"></ul>
</div>

<div class="chat">
    <div id="messages" class="messages"></div>

    <form id="form" class="input-area">
        <input id="input" autocomplete="off" placeholder="Введите сообщение..." />
        <button type="submit">Send</button>
    </form>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
